version: '3.8'

services:
  # ==================== Frontend (Next.js) ====================
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # use service name for inter-container calls
      - NEXT_PUBLIC_API_URL=http://backend:3001
      - API_INTERNAL_URL=http://backend:3001
    depends_on:
      - backend
    networks:
      - livesports-network


  # ==================== Backend (Express) ====================
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://livesports:livesports123@postgres:5432/livesports_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-livesports-super-secret-key-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-livesports-refresh-secret-key-change-in-production}
      - FRONTEND_URL=http://localhost:3000
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY:-}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY:-}
      - AWS_BUCKET=${AWS_BUCKET:-livesports-bucket}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - FOOTBALL_DATA_API_TOKEN=${FOOTBALL_DATA_API_TOKEN:-}
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY:-}
      - RAPIDAPI_KEY=${RAPIDAPI_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - livesports-network
    restart: unless-stopped

  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=livesports
      - POSTGRES_PASSWORD=livesports123
      - POSTGRES_DB=livesports_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/prisma/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livesports -d livesports_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - livesports-network
    restart: unless-stopped

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-livesports-redis-pass}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-livesports-redis-pass} ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - livesports-network
    restart: unless-stopped

  # ==================== Nginx (Reverse Proxy) ====================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - livesports-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  uploads:
    driver: local

networks:
  livesports-network:
    driver: bridge
